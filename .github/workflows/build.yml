name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
    - name: Test imports
      run: |
        python -c "from mining_by_numbers.game import MiningGame; print('Import successful')"
        
    - name: Check syntax
      run: |
        python -m py_compile mining_by_numbers/game.py
        python -m py_compile main.py
        
    - name: List files
      run: |
        ls -la
        echo "--- Project Files ---"
        find . -name "*.py" -o -name "*.md" -o -name "*.yml" | head -20